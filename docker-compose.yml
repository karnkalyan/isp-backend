version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: kisan-isp-backend:latest
    container_name: kisan-api
    restart: unless-stopped
    ports:
      - "3200:3200"
    volumes:
      # Mount the local uploads folder to the container
      # This ensures files uploaded through the API are not lost when the container is recreated
      - ./uploads:/app/uploads
      
      # (Optional) Mount the .env file directly if you don't want to copy it during build
      # - ./.env:/app/.env
    
    # Alternatively, you can pass environment variables directly here
    # env_file:
    #   - .env
    
    # environment:
    #   - NODE_ENV=production
    #   - DATABASE_URL=mysql://user:password@host:3306/kisan_isp
    
    # If you have a local database in docker-compose, you can depend on it
    # depends_on:
    #   - db

