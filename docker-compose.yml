services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: kisan-isp-backend:latest
    container_name: kisan-api
    restart: unless-stopped
    ports:
      - "3200:3200"
    volumes:
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3200
    # Note: Ensure DATABASE_URL in .env points to your VPS database host

